name: Frontend CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write

env:
  DOCR_REGISTRY: ${{ secrets.DOCR_REGISTRY }}
  K8S_DEVOPS_REPO: tianluai/kubernetes-devops

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: latest
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint

  build-check:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
      NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: latest
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build

  version-bump:
    runs-on: ubuntu-latest
    needs: [lint, build-check]
    if: github.event_name == 'push'
    outputs:
      version: ${{ steps.bump.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - id: bump
        run: |
          CURRENT=$(node -p "require('./package.json').version")
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          NEW="${MAJOR}.${MINOR}.$((PATCH + 1))"
          node -e "const p=require('./package.json');p.version='${NEW}';require('fs').writeFileSync('package.json',JSON.stringify(p,null,2)+'\n')"
          echo "version=${NEW}" >> $GITHUB_OUTPUT
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json
          git commit -m "chore: bump version to v${{ steps.bump.outputs.version }}"
          git pull --rebase origin main
          git push

  docker:
    runs-on: ubuntu-latest
    needs: [version-bump]
    env:
      DOCR_REGISTRY: ${{ secrets.DOCR_REGISTRY }}
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
      NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
    outputs:
      image-tag: ${{ needs.version-bump.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - name: Require DOCR_REGISTRY secret
        run: |
          if [ -z "$DOCR_REGISTRY" ]; then
            echo "::error::Add repository secret DOCR_REGISTRY (e.g. registry.digitalocean.com/your-registry-name)"
            exit 1
          fi
      - uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}
      - run: doctl registry login --expiry-seconds 1200
      - uses: docker/setup-buildx-action@v3
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCR_REGISTRY }}/tianluai-web
          tags: |
            type=raw,value=${{ needs.version-bump.outputs.version }}
            type=sha,prefix=
            type=raw,value=latest
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=${{ env.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
            NEXT_PUBLIC_API_URL=${{ env.NEXT_PUBLIC_API_URL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: [docker, version-bump]
    if: github.ref == 'refs/heads/main'
    concurrency:
      group: k8s-dispatch-frontend-prod
      cancel-in-progress: true
    steps:
      - uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.GH_PAT_DEVOPS_TOKEN }}
          repository: ${{ env.K8S_DEVOPS_REPO }}
          event-type: deploy-frontend
          client-payload: |
            {
              "image": "${{ env.DOCR_REGISTRY }}/tianluai-web",
              "tag": "${{ needs.version-bump.outputs.version }}",
              "environment": "prod"
            }
