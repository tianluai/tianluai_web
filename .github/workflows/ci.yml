name: Frontend CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DOCKER_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/tianluai-web
  K8S_DEVOPS_REPO: tianluai/kubernetes-devops
  NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY || 'pk_test_ci_placeholder' }}
  NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL || 'http://localhost:3001' }}

jobs:
  # ── Lint & Format ──
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: latest
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint

  # ── Build Validation ──
  build-check:
    name: Build Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: latest
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build

  # ── Version Bump ──
  version-bump:
    name: Version Bump
    runs-on: ubuntu-latest
    needs: [lint, build-check]
    if: github.event_name == 'push'
    outputs:
      version: ${{ steps.bump.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.K8S_DEVOPS_PAT }}

      - name: Bump patch version
        id: bump
        run: |
          CURRENT=$(node -p "require('./package.json').version")
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          NEW_VERSION="${MAJOR}.${MINOR}.$((PATCH + 1))"
          node -e "
            const pkg = require('./package.json');
            pkg.version = '${NEW_VERSION}';
            require('fs').writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "
          echo "version=${NEW_VERSION}" >> $GITHUB_OUTPUT
          echo "Bumped version: ${CURRENT} → ${NEW_VERSION}"

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json
          git commit -m "chore: bump version to v${{ steps.bump.outputs.version }}"
          git push

  # ── Docker Build & Push ──
  docker:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: [version-bump]
    outputs:
      image-tag: ${{ needs.version-bump.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_IMAGE }}
          tags: |
            type=raw,value=${{ needs.version-bump.outputs.version }}
            type=sha,prefix=
            type=raw,value=latest

      - uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=${{ env.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
            NEXT_PUBLIC_API_URL=${{ env.NEXT_PUBLIC_API_URL }}
            NEXT_PUBLIC_SENTRY_DSN=${{ secrets.NEXT_PUBLIC_SENTRY_DSN }}
            SENTRY_ORG=${{ secrets.SENTRY_ORG }}
            SENTRY_PROJECT=${{ secrets.SENTRY_PROJECT }}
            SENTRY_AUTH_TOKEN=${{ secrets.SENTRY_AUTH_TOKEN }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Trigger Deployment ──
  deploy:
    name: Trigger K8s Deployment
    runs-on: ubuntu-latest
    needs: [docker, version-bump]
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Trigger deployment in kubernetes-devops
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.K8S_DEVOPS_PAT }}
          repository: ${{ env.K8S_DEVOPS_REPO }}
          event-type: deploy-frontend
          client-payload: |
            {
              "image": "${{ env.DOCKER_IMAGE }}",
              "tag": "${{ needs.version-bump.outputs.version }}",
              "environment": "prod"
            }
