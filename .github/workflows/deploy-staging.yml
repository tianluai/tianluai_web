name: Deploy staging

on:
  pull_request:
    branches: [staging]
  push:
    branches: [staging]
  workflow_dispatch:

permissions:
  contents: read

env:
  DOCR_REGISTRY: ${{ secrets.DOCR_REGISTRY }}
  K8S_DEVOPS_REPO: tianluai/kubernetes-devops

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: latest
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint

  build-check:
    runs-on: ubuntu-latest
    environment: staging
    env:
      NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
      NEXT_PUBLIC_SENTRY_DSN: ${{ secrets.NEXT_PUBLIC_SENTRY_DSN }}
      AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
      AUTH_GOOGLE_ID: ${{ secrets.AUTH_GOOGLE_ID }}
      AUTH_GOOGLE_SECRET: ${{ secrets.AUTH_GOOGLE_SECRET }}
      AUTH_JWT_SECRET: ${{ secrets.AUTH_JWT_SECRET }}
      AUTH_URL: ${{ secrets.AUTH_URL }}
      SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
      SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
      SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: latest
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build

  docker:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    needs: [lint, build-check]
    environment: staging
    env:
      DOCR_REGISTRY: ${{ secrets.DOCR_REGISTRY }}
      NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
      NEXT_PUBLIC_SENTRY_DSN: ${{ secrets.NEXT_PUBLIC_SENTRY_DSN }}
      AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
      AUTH_GOOGLE_ID: ${{ secrets.AUTH_GOOGLE_ID }}
      AUTH_GOOGLE_SECRET: ${{ secrets.AUTH_GOOGLE_SECRET }}
      AUTH_JWT_SECRET: ${{ secrets.AUTH_JWT_SECRET }}
      AUTH_URL: ${{ secrets.AUTH_URL }}
      SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
      SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
      SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
    outputs:
      image-tag: ${{ steps.staging-tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: staging
      - id: staging-tag
        run: echo "tag=staging-$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
      - name: Require DOCR_REGISTRY secret
        run: |
          if [ -z "$DOCR_REGISTRY" ]; then
            echo "::error::Add repository secret DOCR_REGISTRY (e.g. registry.digitalocean.com/your-registry-name)"
            exit 1
          fi
      - uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}
      - run: doctl registry login --expiry-seconds 1200
      - uses: docker/setup-buildx-action@v3
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCR_REGISTRY }}/tianluai-web
          tags: |
            type=raw,value=${{ steps.staging-tag.outputs.tag }}
            type=raw,value=staging-latest
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            NEXT_PUBLIC_API_URL=${{ env.NEXT_PUBLIC_API_URL }}
            NEXT_PUBLIC_SENTRY_DSN=${{ env.NEXT_PUBLIC_SENTRY_DSN }}
            AUTH_SECRET=${{ env.AUTH_SECRET }}
            AUTH_GOOGLE_ID=${{ env.AUTH_GOOGLE_ID }}
            AUTH_GOOGLE_SECRET=${{ env.AUTH_GOOGLE_SECRET }}
            AUTH_JWT_SECRET=${{ env.AUTH_JWT_SECRET }}
            AUTH_URL=${{ env.AUTH_URL }}
            SENTRY_ORG=${{ env.SENTRY_ORG }}
            SENTRY_PROJECT=${{ env.SENTRY_PROJECT }}
            SENTRY_AUTH_TOKEN=${{ env.SENTRY_AUTH_TOKEN }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    needs: [docker]
    environment: staging
    env:
      DOCR_REGISTRY: ${{ secrets.DOCR_REGISTRY }}
      K8S_DEVOPS_REPO: tianluai/kubernetes-devops
    concurrency:
      group: k8s-dispatch-frontend-staging
      cancel-in-progress: true
    steps:
      - uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.GH_PAT_DEVOPS_TOKEN }}
          repository: ${{ env.K8S_DEVOPS_REPO }}
          event-type: deploy-frontend
          client-payload: |
            {
              "image": "${{ env.DOCR_REGISTRY }}/tianluai-web",
              "tag": "${{ needs.docker.outputs['image-tag'] }}",
              "environment": "staging"
            }
